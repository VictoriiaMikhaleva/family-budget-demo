<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var theme = localStorage.getItem("family-budget-demo-theme");
        if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Демо калькулятора семейного бюджета — учёт доходов и расходов, лимиты и графики" />
    <meta name="theme-color" content="#020617" />
    <title>Калькулятор расходов — демо</title>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <noscript>
      <p style="margin: 2rem; font-family: system-ui, sans-serif; color: #0f172a">Включите JavaScript, чтобы открыть калькулятор расходов.</p>
    </noscript>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
